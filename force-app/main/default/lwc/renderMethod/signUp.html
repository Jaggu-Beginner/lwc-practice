<template>
     <lightning-card title="Render Multiple Templates" icon-name="custom:custom14">
          <div class="slds-p-around_medium slds-var-m-bottom_large">
               <H2 class="slds-p-around_medium slds-var-m-bottom_large">Signup form </H2>
               <lightning-input type="text" label="First Name"></lightning-input>
               <lightning-input type="text" label="Last Name"></lightning-input>
               <lightning-input type="email" label="Email"></lightning-input>
               <lightning-input type="password" label="Password"></lightning-input>
               <div>
                    <lightning-button variant="destructive" label="Back" title="Back" onclick={handleChange}
                         class="slds-m-top_large slds-m-left_x-small">
                    </lightning-button>
                    <lightning-button variant="success" label="signup" title="signup" onclick={submitHandler}
                         class="slds-m-top_large slds-m-left_x-small"></lightning-button>
               </div>
          </div>
     </lightning-card>
</template>
