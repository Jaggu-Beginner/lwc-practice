<template>
    <lightning-card title="Create record using lightning-record-form">
        <lightning-record-form
        object-api-name={objectName}
        fields={fieldList}
        onsuccess={successHandler}
        ></lightning-record-form>
    </lightning-card>
    <lightning-card title="Display record using lightning-record-form">
        <lightning-record-form
        record-id="001Bi00000RRLVbIAP"
        object-api-name={objectName}
        fields={fieldList}
        ></lightning-record-form>
    </lightning-card>
        <lightning-card title="Display record in readonlymode using lightning-record-form">
        <lightning-record-form
        record-id="001Bi00000RRLVbIAP"
        object-api-name={objectName}
        fields={fieldList}
        mode="readonly"
        ></lightning-record-form>
    </lightning-card>
    <lightning-card title="Display record in readonlymode using lightning-record-form">
        <lightning-record-form
        record-id="001Bi00000RRLVbIAP"
        object-api-name={objectName}
        mode="edit"
        columns="2"
        layout-type="compact"
        ></lightning-record-form>
    </lightning-card>
</template>
