<template>
    <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">

            <!-- Header -->
            <header class="slds-modal__header">
                <h2 class="slds-text-heading_medium">Child Modal</h2>
            </header>

            <!-- Body -->
            <div class="slds-modal__content slds-p-around_medium">
                <p>This is modal body</p>
            </div>

            <!-- Footer -->
            <footer class="slds-modal__footer" onclick={footerHandler}>
                <lightning-button label="Cancel"></lightning-button>
                <lightning-button variant="brand" label="OK" onclick={closeHandler}></lightning-button>
            </footer>

        </div>
    </section>

    <div class="slds-backdrop slds-backdrop_open"></div>
</template>
