<template>
    <lightning-card title="getPicklistValuesByRecordType">
        <div class="slds-p-around_medium">
            <template lwc:if={accountSourceOptions}>
                <lightning-combobox name="Account Source" label="Account Source" placeholder="Accountsource"
                    value={selectedAccountSource} onchange={handleChange} options={accountSourceOptions}>
                </lightning-combobox>
                <p>selected Account Source is : {selectedAccountSource} </p>
            </template>
        </div>
    </lightning-card>
    <lightning-card title="getPicklistValuesByRecordType">
        <div class="slds-p-around_medium">
            <template lwc:if={customerPrioritycOptions}>
                <lightning-combobox name="CustomerPriority__c" label="CustomerPriority__c"
                    placeholder="CustomerPriority__c" value={selectedCustomerPriorityc} onchange={handleChange}
                    options={customerPrioritycOptions}>
                </lightning-combobox>
                <p>selectedCustomerPriorityc is : {selectedCustomerPriorityc} </p>
            </template>
        </div>
    </lightning-card>
</template>
