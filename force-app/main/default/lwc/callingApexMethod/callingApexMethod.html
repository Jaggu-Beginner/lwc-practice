<template>
    <lightning-card title="calling Apex method using wire property">
        <div class="slds-p-around_medium">
            <template lwc:if={accounts.data}>
                <template for:each={accounts.data} for:item="account">
                    <div class="slds-box slds-box_small slds-m-bottom_small" key={account.Id}>
                        <p><strong>Name :</strong> {account.Name}</p>
                        <p><strong>Type :</strong> {account.Type}</p>
                        <p><strong>Industry :</strong> {account.Industry}</p>
                    </div>
                </template>
            </template>
        </div>
    </lightning-card>
     <lightning-card title="calling Apex method using wire property">
        <div class="slds-p-around_medium">
            <template lwc:if={accountsList}>
                <template for:each={accountsList} for:item="account">
                    <div class="slds-box slds-box_small slds-m-bottom_small" key={account.Id}>
                        <p><strong>Name :</strong> {account.Name}</p>
                        <p><strong>Type :</strong> {account.newType}</p>
                        <p><strong>Industry :</strong> {account.Industry}</p>
                    </div>
                </template>
            </template>
        </div>
    </lightning-card>
</template>
