<template>
    <lightning-card title="Custom validation in lightning record edit form">
        <lightning-record-edit-form
        object-api-name={objectName}
        onsubmit={submitHandler}
        onsuccess={handleSuccess}
        onerror={handleError}
        >
        <lightning-input
        label="Name"
        value={name}
        onkeyup={handleChange}
        class="slds-m-bottom_x-small"></lightning-input>

        <lightning-button class="slds-m-top_small" label="Create Account" type="submit"></lightning-button>
        </lightning-record-edit-form>
    </lightning-card>
</template>
